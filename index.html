<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worms LAN Battle</title>
    <!-- Tailwind CSS para estilização moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS para conexão P2P facilitada -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- Lucide Icons para os ícones da interface -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap');
        .font-retro {
            font-family: 'Press Start 2P', monospace;
        }
        .font-game {
            font-family: 'Rajdhani', sans-serif;
        }
        /* Custom scrollbar para chat e listas */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-game overflow-x-hidden selection:bg-indigo-500 selection:text-white">

    <!-- Efeitos de Fundo Modernos -->
    <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-950 to-slate-950 pointer-events-none z-0"></div>

    <!-- Header Principal -->
    <header class="relative z-10 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-pink-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 2a10 10 0 0 0-10 10c0 5.523 4.477 10 10 10s10-4.477 10-10A10 10 0 0 0 12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z" />
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-wider bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent">WORMS LAN BATTLE</h1>
                <p class="text-xs text-slate-400">Artilharia estática multijogador em tempo real</p>
            </div>
        </div>

        <!-- Painel de Conexão Rápida -->
        <div class="flex items-center gap-4 bg-slate-950/60 p-2 rounded-xl border border-slate-800">
            <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
                <span id="status-text">Desconectado (Modo Local)</span>
            </div>
            <button id="sfx-toggle" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors" title="Alternar Sons">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="relative z-10 flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Painel
